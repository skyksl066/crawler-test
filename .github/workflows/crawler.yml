name: Python Crawler Automation

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run crawler
        run: |
          python crawler.py > crawler_output.txt 2>&1
          echo "Crawler executed successfully"
          cat crawler_output.txt

      - name: Upload to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          pip install paramiko
          python << 'EOF'
import os
import ftplib
from datetime import datetime

ftp_host = os.getenv('FTP_HOST')
ftp_user = os.getenv('FTP_USER')
ftp_password = os.getenv('FTP_PASSWORD')

try:
    ftp = ftplib.FTP(ftp_host)
    ftp.login(ftp_user, ftp_password)
    ftp.cwd('/')
    print('[FTP] Connected to: ' + ftp_host)

    timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
    filename = 'crawler_output_' + timestamp + '.txt'
    with open('crawler_output.txt', 'rb') as f:
        ftp.storbinary('STOR ' + filename, f)
    print('[FTP] Upload Success: ' + filename)

except Exception as e:
    print('[FTP] Error: ' + str(e))
finally:
    try:
        ftp.quit()
    except:
        pass
EOF
